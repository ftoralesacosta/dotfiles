set -g default-terminal "screen-256color"
#unbind C-b
#set-option -g prefix M-Space
#bind Space send-prefix
set -g prefix C-Space
bind Space send-prefix
bind-key R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."
unbind '"'

unbind %
bind | split-window -h
bind - split-window -v

set -g mouse on
